name: Publish

on:
  release:
    types:
      - published

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      id-token: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.x

    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.x

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Pack LightObjects
      run: |
        dotnet build ./src/LightObjects/LightObjects.csproj --configuration Release --no-restore
        dotnet pack ./src/LightObjects/LightObjects.csproj --configuration Release --no-build --output .
    
    - name: Pack LightObjects.Generated
      run: |
        dotnet build ./src/LightObjects.Generated/LightObjects.Generated.csproj --configuration Release --no-restore
        dotnet pack ./src/LightObjects.Generated/LightObjects.Generated.csproj --configuration Release --no-build --output .

    - name: NuGet Login
      uses: NuGet/login@v1
      id: nuget-login
      with:
        user: ${{secrets.NUGET_USER}}

    - name: Push to NuGet
      run: dotnet nuget push "*.nupkg" --api-key ${{steps.nuget-login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
